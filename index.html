<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Job Buddy — Simply connecting talent to opportunity</title>

  <!-- Brand fonts (optional; falls back to system fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="icon" href="logo.png" type="image/png" />

  <style>
    :root{
      /* —— Brand (from your logo) —— */
      --bg: #CFEAFF;          /* sky blue */
      --surface: #F3F8FF;     /* softer blue */
      --card: #FFFFFF;        /* card surface */
      --ink: #0F172A;         /* main text */
      --muted: #5B6B82;       /* secondary text */
      --border: #E6EEF8;      /* card borders */

      --brand: #FF4FA3;       /* pink accent */
      --brand-strong: #D63C86;/* darker pink for hover/focus */
      --brand-soft: #FFE5F1;  /* light pink tint */

      --radius: 16px;
      --shadow: 0 14px 40px rgba(15,23,42,.08);
      --ring: 0 0 0 3px rgba(255,79,163,.25);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--ink);
      background:
        radial-gradient(900px 500px at 85% -10%, rgba(255,255,255,0.55), transparent 60%),
        linear-gradient(180deg, var(--bg), var(--surface));
    }

    .container{max-width:1100px;margin:28px auto 96px;padding:0 16px}

    /* ——— Header / Hero ——— */
    header.hero{
      display:grid;
      grid-template-columns:auto 1fr;
      gap:16px;
      align-items:center;
      padding:16px 18px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:24px;
      box-shadow:var(--shadow);
    }
    .logo-wrap{
      display:flex;align-items:center;gap:12px;
    }
    .logo{
      width:72px;height:72px;object-fit:contain;
      background: #E9F5FF; border:1px dashed #BBD8F5; border-radius:14px; padding:8px;
    }
    .brand-title{
      font-family:Poppins, Inter, sans-serif;
      font-size: clamp(24px, 3.5vw, 36px);
      font-weight:800; letter-spacing:.3px;
      line-height:1.05;
      display:flex; align-items:center; gap:12px;
    }
    .brand-title .pink{
      color:#fff; /* we’ll simulate the black offset shadow from your logo */
      position:relative; display:inline-block; padding:0 6px;
    }
    .brand-title .pink::before{
      content: attr(data-text);
      position:absolute; left:2.8px; top:3.2px; color:#0b0b0b; z-index:0;
      filter: blur(.2px);
    }
    .brand-title .pink::after{
      content: attr(data-text);
      position:absolute; left:0; top:0; z-index:1;
      background: linear-gradient(0deg, var(--brand), var(--brand));
      -webkit-background-clip:text; background-clip:text; color:transparent;
      text-shadow: 0 0 0 rgba(0,0,0,0);
    }
    .brand-sub{
      color:var(--muted); margin-top:2px; font-size:14px;
    }

    /* ——— Toolbar ——— */
    .toolbar{display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; align-items:center}
    .btn{
      background:var(--brand);
      border:1px solid var(--brand-strong);
      color:#fff; font-weight:700; letter-spacing:.2px;
      padding:10px 14px; border-radius:12px; cursor:pointer;
      box-shadow: 0 6px 18px rgba(255,79,163,.25);
    }
    .btn:hover{background:var(--brand-strong)}
    .btn:focus{outline:none; box-shadow: var(--ring)}
    .btn.secondary{
      background:#fff; color:var(--ink);
      border:1px solid var(--border);
      box-shadow:none;
    }
    .btn.secondary:hover{background:#F8FAFF}
    .btn.danger{
      background:#FDE7EB; color:#B5123B; border-color:#F7B7C7;
    }
    .btn.danger:hover{background:#FBD0D9}
    .btn.ghost{
      background:transparent; border:1px dashed #BBD8F5; color:#35527E;
    }
