<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job Buddy — Cute Simple Job Application Tracker</title>
  <meta name="description" content="Track job applications, generate tailored cover letters, and stay organized with Job Buddy. All in your browser, private by default.">
  <style>
    /* ===== Brand Palette (matched to your logo) =====
       Light Blue bg: #BFE8FF   | Pink: #FF4FA3
       Deep Pink: #E43F92       | Ink Black: #121418
    */
    :root{
      --bg: #BFE8FF;
      --bg-2:#D7F1FF;
      --ink:#121418;
      --pink:#FF4FA3;
      --pink-deep:#E43F92;
      --card:#ffffff;
      --muted:#46627A;
      --chip:#F8FBFF;
      --shadow: 0 10px 28px rgba(17,18,24,0.14);
      --radius:16px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--ink);
      background:
        radial-gradient(1200px 800px at 80% -10%, rgba(255,79,163,0.08), transparent 60%),
        linear-gradient(180deg, var(--bg-2), var(--bg));
    }

    .container{max-width:1100px;margin:28px auto 96px;padding:0 16px}

    /* ===== Header with Logo ===== */
    header{
      display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;
      position:relative;
    }
    .brand{display:flex;align-items:center;gap:14px}
    .brand img.logo{
      width:56px;height:56px;object-fit:contain;image-rendering:crisp-edges;
      filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.18));
    }
    .brand-title{display:flex;flex-direction:column}
    .brand-title .title{
      font-size: clamp(26px, 3.2vw, 38px);
      line-height:1.05;font-weight:900;letter-spacing:0.3px;color: var(--ink);
      position:relative;display:inline-block;
    }
    .brand-title .title .text{
      position:relative; display:inline-block; padding:2px 6px 2px 0;
      color: var(--pink);
      text-shadow: -3px 3px 0 #000, -3px 3px 0 #000; /* thick offset shadow */
    }
    .brand-title .tag{
      margin-top:6px;color:var(--ink);font-size:14px;font-weight:600;opacity:.9;
    }

    .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

    .btn{
      background: var(--pink); border: 2px solid #000; color:#fff;
      padding:10px 14px; border-radius: 999px; cursor:pointer;
      font-weight:800; letter-spacing:.2px; box-shadow: 0 4px 0 #000;
      transition: transform .05s ease, box-shadow .05s ease, background .15s ease;
    }
    .btn:hover{ background: var(--pink-deep); }
    .btn:active{ transform: translateY(2px); box-shadow:0 2px 0 #000; }
    .btn.secondary{ background:#fff;color:var(--ink);border-color:#000; }
    .btn.ghost{ background:transparent;color:var(--ink);border:2px dashed #000; }
    .btn.danger{ background:#FF6B8A;border-color:#000; }

    /* ===== Cards / Sections ===== */
    .grid{display:grid;grid-template-columns:1.2fr 1fr;gap:16px}
    .card{
      background: var(--card);
      border: 2px solid #000;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:16px;
      position:relative;
    }
    .card h3{
      margin:0 0 12px;
      font-size:16px;letter-spacing:.2px;
      display:flex;align-items:center;gap:8px;
    }
    .card h3::before{
      content:""; width:9px; height:9px; border-radius:50%;
      background: var(--pink); border:2px solid #000; display:inline-block;
      box-shadow: 0 1px 0 #000;
    }

    label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
    input, textarea, select{
      width:100%; background:#F4FAFF; border:2px solid #000; color:var(--ink);
      border-radius: 12px; padding:10px 12px; outline:none;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.04);
      font-size:14px;
    }
    input:focus, textarea:focus, select:focus{
      box-shadow: 0 0 0 4px rgba(255,79,163,0.2), inset 0 -2px 0 rgba(0,0,0,0.04);
      background:#fff;
    }
    textarea{min-height:96px; resize: vertical;}

    .row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
    .split{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}
    .stack{display:grid;gap:10px}
    .flex{display:flex;gap:8px;flex-wrap:wrap}
    .grow{flex:1}
    .nowrap{white-space:nowrap}
    .right{text-align:right}

    /* ===== Table ===== */
    .table-wrap{overflow:auto;border-radius:14px;border:2px solid #000;background:#fff}
    table{width:100%;border-collapse:collapse;min-width:880px}
    th,td{padding:10px 12px;border-bottom:1px solid rgba(0,0,0,0.08);font-size:14px}
    th{background:#F9FCFF;text-align:left;font-weight:800;color:#253646;position:sticky;top:0}
    tr:hover td{background:#FCFEFF}

    .status{
      padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800;letter-spacing:.2px;
      border:2px solid #000; display:inline-flex; gap:6px; align-items:center; box-shadow:0 2px 0 #000;
      background:var(--chip);
    }
    .s-applied{background:#FFD6EC}
    .s-interview{background:#D9FFE8}
    .s-offer{background:#FFF1B8}
    .s-rejected{background:#FFE0E0}

    footer{margin-top:24px;color:#2a3f52;font-size:12px;text-align:center}

    /* ===== Watermark bear (uses same logo) ===== */
    .watermark{
      position:fixed; right:-40px; bottom:-10px; width:320px; height:auto; opacity:.15;
      pointer-events:none; filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.2));
      transform: rotate(-6deg);
    }

    /* ===== Mobile ===== */
    @media (max-width: 980px){
      .grid{grid-template-columns:1fr}
      .brand img.logo{width:48px;height:48px}
      .brand-title .title{font-size: clamp(22px, 6vw, 32px)}
    }
  </style>
</head>
<body>
  <!-- Watermark image (change the src if your filename is different) -->
  <img src="Untitled (1).png" alt="" class="watermark" aria-hidden="true" />

  <div class="container">
    <header>
      <div class="brand">
        <!-- Header logo (change the src if your filename is different) -->
        <img src="Untitled (1).png" alt="Job Buddy logo" class="logo" />
        <div class="brand-title">
          <div class="title"><span class="text">JOB BUDDY</span></div>
          <div class="tag">Simply connecting talent to opportunity</div>
        </div>
      </div>
      <div class="toolbar">
        <button class="btn" id="exportBtn">Export CSV</button>
        <label class="btn ghost" for="importCsvInput">Import CSV</label>
        <input id="importCsvInput" type="file" accept=".csv" class="sr" style="position:absolute;left:-9999px;" />
        <button class="btn secondary" id="clearAllBtn" title="Remove all data">Reset</button>
      </div>
    </header>

    <!-- Add Job -->
    <section class="card">
      <h3>Add a Job</h3>
      <div class="row">
        <div>
          <label>Company</label>
          <input id="company" placeholder="e.g., Microsoft">
        </div>
        <div>
          <label>Role</label>
          <input id="role" placeholder="e.g., Software Engineer">
        </div>
        <div>
          <label>Location</label>
          <input id="location" placeholder="e.g., Remote / Atlanta, GA">
        </div>
        <div>
          <label>Salary (est.)</label>
          <input id="salary" placeholder="e.g., 120000">
        </div>
        <div>
          <label>Deadline</label>
          <input id="deadline" type="date">
        </div>
        <div>
          <label>Posting Link</label>
          <input id="link" placeholder="https://...">
        </div>
      </div>
      <div class="split" style="margin-top:10px;">
        <div class="stack">
          <label>Notes</label>
          <textarea id="notes" placeholder="What stands out? Referral? Recruiter email?"></textarea>
        </div>
        <button class="btn" id="addJobBtn" style="height:44px; align-self:end;">Add</button>
      </div>
    </section>

    <!-- Cover Letter Generator -->
    <section class="card">
      <h3>Tailored Cover Letter</h3>
      <div class="row">
        <div style="grid-column: span 3;">
          <label>Your Profile (highlights)</label>
          <textarea id="profile" placeholder="3–6 bullets about your experience, stack, impact."></textarea>
        </div>
        <div style="grid-column: span 3;">
          <label>Job Description (paste)</label>
          <textarea id="jd" placeholder="Paste the job description here..."></textarea>
        </div>
      </div>
      <div class="split" style="margin-top:10px;">
        <div class="flex">
          <input id="yourName" class="grow" placeholder="Your Name">
          <input id="yourEmail" class="grow" placeholder="you@example.com">
          <input id="yourPhone" class="grow" placeholder="(xxx) xxx-xxxx">
        </div>
        <button class="btn" id="genLetterBtn">Generate Letter</button>
      </div>
      <div class="stack" style="margin-top:10px;">
        <label>Draft</label>
        <textarea id="letterOut" style="min-height:180px;" placeholder="Your tailored letter will appear here..."></textarea>
        <div class="flex">
          <button id="copyLetterBtn" class="btn secondary">Copy</button>
          <button id="downloadLetterBtn" class="btn">Download .txt</button>
        </div>
      </div>
    </section>

    <!-- Toolbar & List -->
    <section class="card">
      <div class="split">
        <h3>Applications</h3>
        <div class="flex">
          <input id="search" class="grow" placeholder="Search company, role, location...">
          <select id="statusFilter">
            <option value="all">All Statuses</option>
            <option value="applied">Applied</option>
            <option value="interview">Interview</option>
            <option value="offer">Offer</option>
            <option value="rejected">Rejected</option>
            <option value="todo">To Do</option>
          </select>
        </div>
      </div>

      <div class="table-wrap" style="margin-top:12px;">
        <table id="jobsTable">
          <thead>
            <tr>
              <th>Company</th>
              <th>Role</th>
              <th>Location</th>
              <th>Link</th>
              <th>Salary</th>
              <th>Deadline</th>
              <th>Status</th>
              <th>Notes</th>
              <th class="right">Actions</th>
            </tr>
          </thead>
          <tbody id="jobsBody"></tbody>
        </table>
      </div>
    </section>

    <footer>
      Job Buddy — local and private. Data is stored in your browser. Tip: back up via CSV before clearing cache.
    </footer>
  </div>

  <script>
    // ========= State & Helpers =========
    const key = 'jobbuddy_v1';
    const $ = (id) => document.getElementById(id);
    const state = {
      jobs: [],
      get filtered() {
        const q = $('search').value.trim().toLowerCase();
        const f = $('statusFilter').value;
        return this.jobs.filter(j => {
          const hay = [j.company, j.role, j.location, j.notes].join(' ').toLowerCase();
          const matchesQ = hay.includes(q);
          const matchesF = f === 'all' ? true : (j.status === f);
          return matchesQ && matchesF;
        });
      }
    };

    function save(){ localStorage.setItem(key, JSON.stringify(state.jobs)); }
    function load(){
      try{ state.jobs = JSON.parse(localStorage.getItem(key)) || []; }
      catch{ state.jobs = []; }
      render();
    }

    // ========= CRUD =========
    function addJob(job){
      job.id = crypto.randomUUID();
      job.createdAt = new Date().toISOString();
      job.status = job.status || 'todo';
      state.jobs.unshift(job);
      save(); render();
    }
    function updateJob(id, patch){
      const idx = state.jobs.findIndex(j => j.id === id);
      if (idx >= 0){ state.jobs[idx] = { ...state.jobs[idx], ...patch }; save(); render(); }
    }
    function removeJob(id){
      state.jobs = state.jobs.filter(j => j.id !== id);
      save(); render();
    }

    // ========= UI =========
    function statusBadge(s){
      const map = { 'applied':'s-applied','interview':'s-interview','offer':'s-offer','rejected':'s-rejected','todo':'' };
      const label = s[0].toUpperCase() + s.slice(1);
      return `<span class="status ${map[s]||''}">${label}</span>`;
    }

    function render(){
      const tbody = $('jobsBody');
      tbody.innerHTML = '';
      for(const j of state.filtered){
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(j.company)}</td>
          <td>${escapeHtml(j.role)}</td>
          <td>${escapeHtml(j.location || '')}</td>
          <td class="nowrap">${j.link ? '<a href="' + safeUrl(j.link) + '" target="_blank">Open</a>' : ''}</td>
          <td>${j.salary ? formatMoney(j.salary) : ''}</td>
          <td>${j.deadline ? new Date(j.deadline).toLocaleDateString() : ''}</td>
          <td>${statusBadge(j.status)}</td>
          <td>${escapeHtml(j.notes || '')}</td>
          <td class="right nowrap">
            <select data-act="setStatus" data-id="${j.id}">
              <option value="">Set status…</option>
              <option value="todo">To Do</option>
              <option value="applied">Applied</option>
              <option value="interview">Interview</option>
              <option value="offer">Offer</option>
              <option value="rejected">Rejected</option>
            </select>
            <button class="btn secondary" data-act="edit" data-id="${j.id}">Edit</button>
            <button class="btn danger" data-act="delete" data-id="${j.id}">Delete</button>
          </td>`;
        tbody.appendChild(tr);
      }
    }

    // Add job
    $('addJobBtn').addEventListener('click', () => {
      const company = $('company').value.trim();
      const role = $('role').value.trim();
      if(!company || !role){ alert('Company and Role are required.'); return; }
      addJob({
        company, role,
        location: $('location').value.trim(),
        salary: $('salary').value.trim(),
        deadline: $('deadline').value,
        link: $('link').value.trim(),
        notes: $('notes').value.trim(),
      });
      ['company','role','location','salary','deadline','link','notes'].forEach(id => $(id).value = '');
    });

    // Table actions (edit/delete)
    $('jobsTable').addEventListener('click', (e) => {
      const btn = e.target.closest('button,select');
      if(!btn) return;
      const id = btn.getAttribute('data-id');
      const act = btn.getAttribute('data-act');
      if(act === 'delete'){
        if(confirm('Delete this job?')) removeJob(id);
      }else if(act === 'edit'){
        const j = state.jobs.find(x => x.id === id);
        if(!j) return;
        const notes = prompt('Edit notes:', j.notes || '') ?? j.notes;
        const salary = prompt('Edit salary:', j.salary || '') ?? j.salary;
        updateJob(id, { notes, salary });
      }
    });

    // Status change
    $('jobsTable').addEventListener('change', (e) => {
      const sel = e.target;
      if(sel.getAttribute('data-act') === 'setStatus'){
        const id = sel.getAttribute('data-id');
        const val = sel.value;
        if(val) updateJob(id, { status: val });
      }
    });

    // Filters
    $('search').addEventListener('input', render);
    $('statusFilter').addEventListener('change', render);

    // Export CSV
    $('exportBtn').addEventListener('click', () => {
      const cols = ['company','role','location','link','salary','deadline','status','notes','createdAt','id'];
      const rows = [cols.join(',')].concat(
        state.jobs.map(j => cols.map(c => csvCell(j[c] ?? '')).join(','))
      );
      const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = 'job-buddy.csv'; a.click(); URL.revokeObjectURL(a.href);
    });

    // Import CSV
    $('importCsvInput').addEventListener('change', async (e) => {
      const file = e.target.files[0]; if(!file) return;
      const text = await file.text();
      const [header, ...lines] = text.split(/\r?\n/).filter(Boolean);
      const cols = header.split(',');
      const idx = (k) => cols.indexOf(k);
      const toVal = (v) => v?.replace(/^"|"$/g,'').replace(/""/g,'"') ?? '';
      const jobs = lines.map(line => {
        const cells = parseCsvLine(line);
        return {
          company: toVal(cells[idx('company')]),
          role: toVal(cells[idx('role')]),
          location: toVal(cells[idx('location')]),
          link: toVal(cells[idx('link')]),
          salary: toVal(cells[idx('salary')]),
          deadline: toVal(cells[idx('deadline')]),
          status: toVal(cells[idx('status')]) || 'todo',
          notes: toVal(cells[idx('notes')]),
          createdAt: toVal(cells[idx('createdAt')]) || new Date().toISOString(),
          id: toVal(cells[idx('id')]) || crypto.randomUUID()
        };
      });
      if(!confirm(`Import ${jobs.length} items? This will merge with existing.`)) return;
      const existing = new Map(state.jobs.map(j => [j.id, j]));
      for(const j of jobs) existing.set(j.id, j);
      state.jobs = Array.from(existing.values()).sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
      save(); render();
      e.target.value = '';
    });

    // Reset
    $('clearAllBtn').addEventListener('click', () => {
      if(confirm('This will erase all local data (cannot be undone). Proceed?')){
        localStorage.removeItem(key);
        state.jobs = [];
        render();
      }
    });

    // Cover Letter Generator (client-side)
    $('genLetterBtn').addEventListener('click', () => {
      const profile = $('profile').value.trim();
      const jd = $('jd').value.trim();
      const name = $('yourName').value.trim() || 'Your Name';
      const email = $('yourEmail').value.trim();
      const phone = $('yourPhone').value.trim();
      const companyGuess = guessCompanyFromJD(jd);
      const today = new Date().toLocaleDateString();
      const body = generateLetter({ name, email, phone, profile, jd, company: companyGuess, date: today });
      $('letterOut').value = body;
    });

    $('copyLetterBtn').addEventListener('click', async () => {
      const txt = $('letterOut').value; if(!txt) return;
      try{ await navigator.clipboard.writeText(txt); alert('Copied!'); }
      catch{ alert('Copy failed.'); }
    });

    $('downloadLetterBtn').addEventListener('click', () => {
      const blob = new Blob([$('letterOut').value], { type: 'text/plain;charset=utf-8;' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = 'cover-letter.txt'; a.click(); URL.revokeObjectURL(a.href);
    });

    // Utils
    function escapeHtml(s=''){ return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;', "'":'&#39;'}[m])); }
    function safeUrl(u=''){ try{ const url = new URL(u); return url.href; } catch { return '#'; } }
    function formatMoney(v){ const n = Number(String(v).replace(/[^0-9.]/g,'')); if(!n) return v; return n.toLocaleString(undefined,{style:'currency',currency:'USD',maximumFractionDigits:0}); }
    function csvCell(value){ const s = String(value ?? ''); if(/[",\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"'; return s; }
    function parseCsvLine(line){
      const out=[]; let cur=''; let inQ=false;
      for(let i=0;i<line.length;i++){
        const c=line[i];
        if(inQ){
          if(c === '"' && line[i+1] === '"'){ cur+='"'; i++; }
          else if(c === '"'){ inQ=false; }
          else cur+=c;
        }else{
          if(c === ','){ out.push(cur); cur=''; }
          else if(c === '"'){ inQ=true; }
          else cur+=c;
        }
      } out.push(cur); return out;
    }
    function guessCompanyFromJD(jd){ const m = jd.match(/\b(?:at|with)\s+([A-Z][A-Za-z0-9&.\- ]{1,40})/); return m ? m[1].trim() : 'Hiring Team'; }
    function generateLetter({ name, email, phone, profile, jd, company, date }){
      const highlights = profile.split(/\n|•|-/).map(s=>s.trim()).filter(Boolean).slice(0,6).map(s=>'• '+s).join('\n');
      const keySkills = extractKeywords(jd).slice(0,10).join(', ');
      return `${date}

${company} Hiring Team,

I'm excited to apply for this role. Based on the job description, the position values: ${keySkills || 'impact, collaboration, and problem solving'}. I believe my background aligns strongly.

Highlights:
${highlights || '• Add 3–6 brief bullets summarizing your most relevant achievements.'}

Why I’m a fit:
- I’ve delivered measurable impact in similar environments (e.g., performance, reliability, or customer outcomes).
- My toolkit matches the core stack and responsibilities; I ramp quickly and communicate clearly.
- I care about shipping, iteration, and being a good teammate.

I’d love to discuss how I can contribute to ${company}. Thank you for your time and consideration.

Best regards,
${name}
${email ? email + '\\n' : ''}${phone || ''}`;
    }
    function extractKeywords(text){
      const common = new Set(['and','or','the','a','an','of','for','to','in','with','on','by','is','are','you','we','our','as','be','will','this','that','your','at','from','into','about','across','within','per','an','it','they','them','their','including','include','such']);
      const words = (text||'').toLowerCase().replace(/[^a-z0-9+.#\- ]/g,' ').split(/\s+/).filter(Boolean);
      const freq = new Map();
      for(const w of words){ if(common.has(w) || w.length<2) continue; freq.set(w,(freq.get(w)||0)+1); }
      return Array.from(freq.entries()).sort((a,b)=>b[1]-a[1]).map(([w])=>w);
    }

    // Boot
    load();
  </script>
</body>
</html>
